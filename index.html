<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPA 608 Quiz</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; max-width:700px; margin:auto; }
button { padding:10px; margin:5px; cursor:pointer; }
.correct { background:#c8f7c5; }
.incorrect { background:#f7c5c5; }
</style>

</head>

<body>

<div class="card">
<h2 id="question">Click Start</h2>

<div id="answers"></div>

<br>

<button onclick="startQuiz()">Start Quiz</button>
<button onclick="next()">Next</button>

<p id="score"></p>
</div>

<script>

const questions = [
{
q:"Which refrigerant contains chlorine?",
a:["R-22","R-134a","R-410A","R-1234yf"],
c:0
},
{
q:"Which process cleans refrigerant?",
a:["Recycle","Recover","Reclaim","Restore"],
c:0
}
];

let index = 0;
let correct = 0;

function startQuiz(){
index = 0;
correct = 0;
load();
}

function load(){
let q = questions[index];
document.getElementById("question").innerText = q.q;

let html = "";
q.a.forEach((ans,i)=>{
html += `<button onclick="answer(${i})">${ans}</button><br>`;
});
document.getElementById("answers").innerHTML = html;
}

function answer(i){
if(i === questions[index].c){
correct++;
}
}

function next(){
index++;
if(index >= questions.length){
document.getElementById("question").innerText = "Finished";
document.getElementById("answers").innerHTML = "";
document.getElementById("score").innerText = "Score: " + correct;
return;
}
load();
}

</script>

</body>
</html>
