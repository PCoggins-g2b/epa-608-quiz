<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPA 608 Web Quiz System</title>

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f5f5}
button{padding:10px;margin:5px;cursor:pointer}
.answer{display:block;margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:8px}
.correct{background:#c8f7c5}
.incorrect{background:#f7c5c5}
</style>
</head>

<body>
<h1>EPA 608 Quiz</h1>

<div id="app"></div>

<script>
const questions = [
  {q:"Sample Question: Refrigerant entering compressor is?", a:["Liquid","Vapor","Solid","Plasma"], c:1},
  {q:"Recovery means?", a:["Remove refrigerant","Destroy refrigerant","Clean refrigerant","Store air"], c:0}
];

let index = 0;
let answers = {};

function render(){
  const q = questions[index];
  let html = `<h2>${q.q}</h2>`;
  q.a.forEach((opt,i)=>{
    html += `<div class="answer" onclick="select(${i})">${opt}</div>`;
  });
  html += `<br><button onclick="prev()">Prev</button><button onclick="next()">Next</button>`;
  document.getElementById('app').innerHTML = html;
}

function select(i){
  answers[index]=i;
  render();
}

function prev(){ if(index>0){index--;render();}}
function next(){ if(index<questions.length-1){index++;render();}}

render();
</script>

</body>
</html>
